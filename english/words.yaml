words:
  - word: "abandon"
    type: "verb"
    translation: "terk etmek, bırakmak"
    example1: "She decided to <b>abandon</b> her old habits."
    example1_tr: "Eski alışkanlıklarını <b>terk etmeye</b> karar verdi."
    example2: "The crew had to <b>abandon</b> the sinking ship."
    example2_tr: "Mürettebat batan gemiyi <b>terk etmek</b> zorunda kaldı."
    example3: "Don't <b>abandon</b> your dreams just because it's hard."
    example3_tr: "Zor diye hayallerini <b>bırakma</b>."

  - word: "resilient"
    type: "adjective"
    translation: "dayanıklı, dirençli"
    example1: "Children are often more <b>resilient</b> than we think."
    example1_tr: "Çocuklar genellikle düşündüğümüzden daha <b>dayanıklıdır</b>."
    example2: "The company proved to be <b>resilient</b> during the economic crisis."
    example2_tr: "Şirket ekonomik kriz sırasında <b>dirençli</b> olduğunu kanıtladı."
    example3: "You need to be <b>resilient</b> to succeed in this industry."
    example3_tr: "Bu sektörde başarılı olmak için <b>dayanıklı</b> olmalısın."

  - word: "outcome"
    type: "noun"
    translation: "sonuç, netice"
    example1: "The <b>outcome</b> of the election surprised everyone."
    example1_tr: "Seçimin <b>sonucu</b> herkesi şaşırttı."
    example2: "We can't predict the <b>outcome</b> of this experiment."
    example2_tr: "Bu deneyin <b>sonucunu</b> tahmin edemeyiz."
    example3: "A positive <b>outcome</b> depends on careful planning."
    example3_tr: "Olumlu bir <b>sonuç</b>, dikkatli planlamaya bağlıdır."
